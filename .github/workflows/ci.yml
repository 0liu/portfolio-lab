# CI pipeline: Runs lint checks, tests, and builds the package on every push to main and on every pull request.
# Checks identical to local `make check`.
#
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      # clone the repository into the VM
      - name: Check out repository
        uses: actions/checkout@v7

      # install uv (and a pinned Python) — official Astral action.
      # enable-cache re-uses downloaded wheels across runs (keyed on uv.lock).
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true

      # install the package + dev tools exactly per uv.lock
      - name: Install dependencies
        run: uv sync --frozen --dev

      # lint checks
      - name: Lint (ruff check)
        run: uv run ruff check .

      # format check
      - name: Format check (ruff format)
        run: uv run ruff format --check .

      # run tests
      - name: Tests
        run: uv run pytest

      # build the package
      - name: Build sdist and wheel
        run: uv build
